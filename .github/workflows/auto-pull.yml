name: auto-pull

on:
  # Runs on the default branch.
  # Triggered by the completion of the 'tests' workflow on matching branches.
  workflow_run:
    workflows:
      - "tests"
    types:
      - completed
    branches:
      - "bump-*"

jobs:
  label-pr:
    environment: pr-automation
    # The triggering workflow must be triggered by a pull request,
    # and the head repository of the pull request must not be a fork.
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.id == github.repository_id
    runs-on: ubuntu-24.04
    steps:
      # Find the pull request whose source branch is the head branch of the triggering workflow.
      # Output the pull request's URL if it is open and has the 'auto-pull' label.
      # Otherwise, output the empty string so that no further action is taken.
      - name: Find PR associated with workflow run
        id: get-pr
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        shell: bash
        run: |
          pr_url=$(
            gh pr view "$BRANCH" \
              --repo ${{ github.repository }} \
              --json url,state,labels \
              --jq 'if .state == "OPEN" and any(.labels[].name; . == "auto-pull") then .url else "" end'
          )
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      # Determine how to change the labelling of the pull request.
      # If the pull request has a clean status (mergeable and checks have passed),
      #   then the 'pr-pull' label should be applied.
      # If the triggering workflow has a conclusion that is not 'success', 'skipped', or 'neutral',
      #   then the 'auto-pull' label should be removed.
      # Otherwise, do nothing.
      - name: Determine next step
        id: determine-action
        env:
          GH_TOKEN: ${{ github.token }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          PR_URL: ${{ steps.get-pr.outputs.pr_url }}
        shell: bash
        run: |
          if [[ -z "$PR_URL" ]]; then
            next_step="none"
          elif [[ "$CONCLUSION" == "success" || "$CONCLUSION" == "skipped" || "$CONCLUSION" == "neutral" ]]; then
            pr_merge_state_status=$(
              gh pr view "$PR_URL" \
                --json 'mergeStateStatus' \
                --jq '.mergeStateStatus'
            )
            if [[ "$pr_merge_state_status" == "CLEAN" ]]; then
              next_step="apply-pr-pull"
            else
              next_step="none"
            fi
          else
            next_step="remove-auto-pull"
          fi
          echo "next_step=$next_step" >> "$GITHUB_OUTPUT"

      - name: Apply 'pr-pull' label
        if: steps.determine-action.outputs.next_step == 'apply-pr-pull'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_PR_ACCESS_TOKEN }}
        shell: bash
        run: |
          gh pr edit ${{ steps.get-pr.outputs.pr_url }} \
            --add-label pr-pull \
            --remove-label auto-pull

      - name: Remove 'auto-pull' label
        if: steps.determine-action.outputs.next_step == 'remove-auto-pull'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_PR_ACCESS_TOKEN }}
        shell: bash
        run: |
          gh pr edit ${{ steps.get-pr.outputs.pr_url }} \
            --remove-label auto-pull
